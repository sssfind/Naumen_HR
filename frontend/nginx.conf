server {
    listen 80;
    # Поменяй домен на ваш DuckDNS!
    server_name jimmy-neutron.duckdns.org 212.109.196.207;

    # Запросы к API + возможные небольшие вложения; поднимите при появлении тяжёлых multipart.
    client_max_body_size 5m;

    # Сжатие текста/JSON/скриптов — меньше трафика на мобильных сетях (Vite уже минифицирует JS).
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/html
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # SPA-оболочка: без долгого кеша, чтобы после деплоя не оставался старый index.html (ассеты — отдельно).
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Хэшированные файлы из dist (имя меняется при сборке) — длинный кеш безопасен.
    location ~* \.(?:js|mjs|css|woff2?|ttf|eot|otf|png|jpe?g|gif|ico|svg|webp|webmanifest|map)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Раздаем статику React
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Все запросы, начинающиеся с /api, перекидываем на контейнер бэкенда
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
