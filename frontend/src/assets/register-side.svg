<svg
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  xml:lang="ru"
  width="960"
  height="1080"
  viewBox="0 0 960 1080"
  role="img"
>
  <title>NAU-SKILLS — Карта экспертизы</title>
  <desc>Оранжевый баннер регистрации с декоративной графикой и текстом.</desc>

  <defs>
    <style type="text/css">
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&amp;display=swap");

      .fill-bg {
        fill: #ff6720;
      }

      .text {
        fill: #ffffff;
        font-family: "Montserrat", system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      .title {
        font-weight: 800;
        font-size: 102px;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .subtitle {
        font-weight: 700;
        font-size: 56px;
        letter-spacing: 0.01em;
      }

      .lead {
        font-weight: 500;
        font-size: 24px;
        line-height: 1.5;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect class="fill-bg" width="960" height="1080" />

  <!-- Background graphics (under content) -->
  <image
    xlink:href="/top-left-lines.png"
    href="/top-left-lines.png"
    x="-140"
    y="-160"
    width="760"
    height="760"
    preserveAspectRatio="xMinYMin meet"
  />

  <image
    xlink:href="/bottom-right-rings.png"
    href="/bottom-right-rings.png"
    x="300"
    y="320"
    width="980"
    height="980"
    preserveAspectRatio="xMidYMid meet"
  />

  <!-- Content (above graphics) -->
  <g class="text">
    <!-- ~18% top offset before main title -->
    <text class="title" x="48" y="270">NAU-SKILLS</text>

    <text class="subtitle" x="48" y="380">Карта</text>
    <text class="subtitle" x="48" y="450">экспертизы</text>

    <text class="lead" x="48" y="540">Найдите нужного специалиста внутри компании</text>
    <text class="lead" x="48" y="580">Подтвердите навыки коллег</text>
    <text class="lead" x="48" y="620">Развивайте экспертизу вместе</text>
  </g>

  <!-- Logo pinned to bottom-left (padding ~48px) -->
  <image
    xlink:href="/logo.png"
    href="/logo.png"
    x="48"
    y="1004"
    width="220"
    height="28"
    preserveAspectRatio="xMinYMid meet"
  />
</svg>
