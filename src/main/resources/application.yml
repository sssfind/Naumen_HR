spring:
  application:
    name: naumen-hr
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/naumen_hr}
    username: ${SPRING_DATASOURCE_USERNAME:naumen}
    password: ${SPRING_DATASOURCE_PASSWORD:naumen}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

app:
  security:
    allowed-email-domain: ${ALLOWED_EMAIL_DOMAIN:naumen.ru}
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-secret-key-at-least-32-characters-long}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
  health:
    db:
      enabled: true

logging:
  level:
    org.springframework.security: INFO
    ru.naumen.experts: DEBUG
