services:
  postgres:
    image: postgres:16-alpine
    container_name: naumen_hr_postgres
    environment:
      POSTGRES_DB: naumen_hr
      POSTGRES_USER: naumen
      POSTGRES_PASSWORD: naumen
    ports:
      - "5432:5432"
    volumes:
      - naumen_hr_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U naumen -d naumen_hr"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: naumen_hr_backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/naumen_hr
      SPRING_DATASOURCE_USERNAME: naumen
      SPRING_DATASOURCE_PASSWORD: naumen
      SPRING_PROFILES_ACTIVE: prod
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-https://jimmy-neutron.duckdns.org,http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: naumen_hr_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  seeder:
    image: golang:1.23-alpine
    container_name: naumen_hr_seeder
    restart: "no"
    volumes:
      - ./seeder:/app
    working_dir: /app
    environment:
      DATABASE_URL: postgres://naumen:naumen@postgres:5432/naumen_hr?sslmode=disable
    command: sh -c "go mod download && go run ."
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started

volumes:
  naumen_hr_pgdata:
